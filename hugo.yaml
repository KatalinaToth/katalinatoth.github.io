baseURL: "https://katalinatoth.github.io/"
title: "Libby Jenke"
languageCode: en-us
copyright: "Libby Jenke"
enableGitInfo: false
enableEmoji: true
hasCSSJSConfigInAssets: true

build:
  writeStats: true

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-tailwind

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      linkify: true
  highlight:
    lineNos: false
  tableOfContents:
    endLevel: 3
    startLevel: 2

imaging:
  resampleFilter: CatmullRom
  quality: 75
  anchor: smart

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  appearance:
    theme_day: custom
    theme_night: custom
    color_mode: light
    font: native
    font_size: L
  marketing:
    seo:
      site_type: Person
      local_business_type: ""
      org_name: "Libby Jenke"
      description: "Libby Jenke - Assistant Professor of Political Science at University of Houston"
  header:
    navbar:
      enable: true
      fixed: true
      highlight_active_link: true
      show_search: true
  footer:
    copyright:
      notice: "© {year} Libby Jenke. All rights reserved."
  features:
    math:
      enable: false
    search:
      provider: flexsearch
  publications:
    citation_style: apa
  extensions:
    css:
      - css/custom.css

taxonomies:
  tag: tags
  category: categories
  publication_type: publication_types
  author: authors

menus:
  main:
    - name: Bio & C.V.
      url: /bio/
      weight: 10
    - name: Publications
      url: /publication/
      weight: 20
    - name: Research Areas
      url: /#research-areas
      weight: 30
    - name: Contact
      url: /contact/
      weight: 40

permalinks:
  publication: /publication/:slug/
  talk: /talk/:slug/
